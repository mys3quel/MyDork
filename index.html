<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyDork вАФ Recon Launchpad</title>
<style>
:root {
  --bg: #0a0e14; --bg2: #0f1419; --surface: #151b23; --border: #2a303d;
  --text: #c9d1d9; --muted: #6e7681; --accent: #58a6ff; --green: #3fb950;
  --orange: #d2991d; --red: #f85149; --purple: #a371f7; --teal: #39d2c0; --pink: #db61a2;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; font-size: 14px; }
.app { display:flex; min-height:100vh; }
.sidebar { width: 230px; background: var(--bg2); border-right: 1px solid var(--border); padding: 1.5rem 1rem; position: sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0; }
.main { flex:1; padding: 1.5rem 2rem; max-width: 1050px; }
.sidebar .logo { font-size:1rem; font-weight:700; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:2rem; display:block; text-decoration:none; line-height:1.3; }
.nav-item { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0.7rem; border-radius:6px; color:var(--muted); text-decoration:none; font-size:0.85rem; margin-bottom:0.15rem; cursor:pointer; transition:all 0.15s; }
.nav-item:hover { background:rgba(88,166,255,0.06); color:var(--text); }
.nav-item .badge { margin-left:auto; background:var(--border); color:var(--muted); font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:8px; font-weight:500; }

/* SCOPE BAR */
.scope-bar { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1rem 1.2rem 0.8rem; margin-bottom:1.5rem; position: relative; }

/* TABS */
.tab-row { display:flex; gap:0.3rem; flex-wrap:wrap; margin-bottom:0.8rem; }
.tab {
  padding:0.4rem 0.8rem; border-radius:6px; font-size:0.78rem; cursor:pointer;
  background:var(--bg); border:1px solid var(--border); color:var(--muted);
  transition:all 0.15s; white-space:nowrap; display:inline-flex; align-items:center; gap:0.35rem;
  font-family:monospace;
}
.tab:hover { border-color:var(--accent); color:var(--text); }
.tab.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
.tab.all-tab { font-family: inherit; font-weight:600; }
.tab .tab-type { font-size:0.6rem; padding:0.08rem 0.3rem; border-radius:6px; font-weight:600; text-transform:uppercase; }
.tab.active .tab-type { background:rgba(255,255,255,0.2); }
.tab:not(.active) .tab-type-wc { background:rgba(163,113,247,0.15); color:var(--purple); }
.tab:not(.active) .tab-type-ex { background:rgba(57,210,192,0.15); color:var(--teal); }
.tab .tab-org { font-size:0.6rem; opacity:0.7; }
.tab .tab-rm { margin-left:0.2rem; opacity:0.4; font-size:0.85rem; }
.tab .tab-rm:hover { opacity:1; }
.tab.active .tab-rm:hover { color:#ffb0b0; }

/* ADD ROW */
.add-row { display:flex; gap:0.4rem; align-items:flex-end; flex-wrap:wrap; }
.add-row > div { flex:1; min-width:120px; }
.add-row label { display:block; font-size:0.65rem; color:var(--muted); margin-bottom:0.15rem; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; }
.add-row input, .add-row select {
  width:100%; padding:0.45rem 0.5rem; border:1px solid var(--border); border-radius:5px;
  background:var(--bg); color:var(--text); font-size:0.82rem; font-family:monospace;
  transition: border-color 0.2s;
}
.add-row input:focus, .add-row select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(88,166,255,0.12); }
.add-row select { font-family: inherit; cursor:pointer; }
.btn {
  padding:0.45rem 0.9rem; border:1px solid var(--accent); border-radius:5px;
  background:var(--accent); color:#fff; cursor:pointer; font-size:0.78rem; font-weight:600;
  white-space:nowrap; transition:all 0.15s;
}
.btn:hover { background:#4090e0; }
.btn.ghost { background:transparent; color:var(--muted); border-color:var(--border); }
.btn.ghost:hover { border-color:var(--red); color:var(--red); }

/* ACTIVE INDICATOR */
.active-indicator {
  font-size:0.75rem; color:var(--muted); margin-bottom:0.8rem; padding:0.3rem 0;
  border-bottom:1px solid var(--border);
}
.active-indicator span { color:var(--accent); font-weight:600; }

.empty-hint { text-align:center; color:var(--muted); padding:3rem; font-size:0.9rem; }

/* CATEGORY SECTIONS */
.cat-section { background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:1rem; overflow:hidden; }
.cat-header { display:flex; align-items:center; gap:0.5rem; padding:0.7rem 1rem; cursor:pointer; user-select:none; transition:background 0.15s; }
.cat-header:hover { background:rgba(88,166,255,0.03); }
.cat-header.open { border-bottom:1px solid var(--border); }
.cat-header .icon { font-size:1.1rem; }
.cat-header .name { font-weight:600; font-size:0.9rem; }
.cat-header .count { margin-left:auto; font-size:0.7rem; color:var(--muted); background:var(--bg); padding:0.15rem 0.5rem; border-radius:8px; }
.cat-header .arrow { transition:transform 0.2s; font-size:0.7rem; color:var(--muted); }
.cat-header.open .arrow { transform:rotate(90deg); }
.cat-body { display:none; padding:0.7rem; }
.cat-body.open { display:block; }

/* LINK GRID */
.link-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:0.35rem; }
.link-btn {
  display:flex; align-items:center; gap:0.4rem;
  padding:0.5rem 0.6rem; background:var(--bg); border:1px solid var(--border);
  border-radius:5px; color:var(--text); text-decoration:none;
  transition:all 0.12s; overflow:hidden;
}
.link-btn:hover { border-color:var(--accent); background:rgba(88,166,255,0.05); transform:translateX(2px); }
.link-btn .link-body { flex:1; min-width:0; }
.link-btn .link-title { font-size:0.8rem; font-weight:500; line-height:1.2; }
.link-btn .link-sub { font-size:0.63rem; color:var(--muted); font-family:monospace; margin-top:0.1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.link-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; align-self: flex-start; margin-top:0.25rem; }

.dot-blue { background:var(--accent); } .dot-green { background:var(--green); }
.dot-orange { background:var(--orange); } .dot-red { background:var(--red); }
.dot-purple { background:var(--purple); } .dot-teal { background:var(--teal); }
.dot-pink { background:var(--pink); }

@media (max-width: 700px) { .sidebar { display:none; } .main { padding:1rem; } .link-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="app">

<nav class="sidebar">
  <a href="#" class="logo">рЯПівАНвШ†пЄП MyDork</a>
  <div class="nav-item" onclick="scrollToCat('discovery')"><span>рЯФН</span> Subdomain Discovery<span class="badge" id="badge-discovery">0</span></div>
  <div class="nav-item" onclick="scrollToCat('github')"><span>рЯРЩ</span> GitHub Secrets<span class="badge" id="badge-github">0</span></div>
  <div class="nav-item" onclick="scrollToCat('dirs')"><span>рЯУВ</span> Directories & Files<span class="badge" id="badge-dirs">0</span></div>
  <div class="nav-item" onclick="scrollToCat('dorks')"><span>рЯХµпЄП</span> Dorks & Panels<span class="badge" id="badge-dorks">0</span></div>
  <div class="nav-item" onclick="scrollToCat('info')"><span>рЯ©Ї</span> Info Leaks & Errors<span class="badge" id="badge-info">0</span></div>
  <div class="nav-item" onclick="scrollToCat('shodan')"><span>рЯЫ∞пЄП</span> Shodan & Censys<span class="badge" id="badge-shodan">0</span></div>
  <div class="nav-item" onclick="scrollToCat('recon')"><span>рЯМР</span> External Recon<span class="badge" id="badge-recon">0</span></div>
</nav>

<main class="main">

<section class="scope-bar" id="cat-scope">
  <!-- Tabs row -->
  <div class="tab-row" id="tabRow"></div>

  <!-- Add row -->
  <div class="add-row">
    <div><label>Domain</label><input type="text" id="newDomain" placeholder="viator.com" autocomplete="off"></div>
    <div><label>Type</label><select id="newType"><option value="wildcard">*.domain</option><option value="exact">domain.com</option></select></div>
    <div><label>GitHub Org</label><input type="text" id="newOrg" placeholder="optional" autocomplete="off"></div>
    <div><label>&nbsp;</label><button class="btn" onclick="addScope()">+ Add</button></div>
    <div><label>&nbsp;</label><button class="btn ghost" onclick="clearAll()">Clear</button></div>
  </div>
</section>

<!-- Active indicator -->
<div class="active-indicator" id="activeIndicator"></div>

<!-- Categories rendered here -->

</main>
</div>

<script>
// ==================== STATE ====================
let scopes = [];
let activeIdx = -1; // -1 = all

function load() { try { return JSON.parse(localStorage.getItem('rl_scopes_v3')||'[]'); } catch { return []; } }
function save() { localStorage.setItem('rl_scopes_v3', JSON.stringify(scopes)); }
function urlSafe(s) { return encodeURIComponent(s); }

// ==================== SCOPE MGMT ====================
window.addScope = function() {
  const d = document.getElementById('newDomain').value.trim().toLowerCase();
  if (!d) return;
  if (scopes.find(s => s.domain === d)) { alert('Already added'); return; }
  scopes.push({ domain: d, isWildcard: document.getElementById('newType').value === 'wildcard', githubOrg: document.getElementById('newOrg').value.trim() });
  document.getElementById('newDomain').value = ''; document.getElementById('newOrg').value = '';
  if (activeIdx === -1 || activeIdx >= scopes.length - 1) activeIdx = scopes.length - 1;
  save(); renderAll();
};
window.removeScope = function(i) {
  scopes.splice(i,1);
  if (activeIdx >= scopes.length) activeIdx = scopes.length - 1;
  if (scopes.length === 0) activeIdx = -1;
  save(); renderAll();
};
window.clearAll = function() { if(!confirm('Remove all?')) return; scopes=[]; activeIdx=-1; save(); renderAll(); };
window.setActive = function(idx) { activeIdx = idx; save(); renderAll(); };

// ==================== LINK GEN (for a specific scope or all) ====================
function genLinks(scopeList) {
  const all = {};
  function add(id, title, sub, url, dot) { if (!all[id]) all[id] = []; all[id].push({ title, sub, url, dot }); }

  for (const s of scopeList) {
    const d = s.domain, cx = s.isWildcard ? '%25.' : '';

    add('discovery', 'CRT.sh JSON',        `crt.sh/?q=${cx}${d}&output=json`,       `https://crt.sh/?q=${cx}${urlSafe(d)}&output=json`, 'dot-purple');
    add('discovery', 'CRT.sh HTML',        `crt.sh/?q=${cx}${d}`,                   `https://crt.sh/?q=${cx}${urlSafe(d)}`, 'dot-purple');
    add('discovery', 'CRT.sh (dedup)',     `crt.sh/?q=${cx}${d}&deduplicate=Y`,     `https://crt.sh/?q=${cx}${urlSafe(d)}&deduplicate=Y`, 'dot-purple');
    add('discovery', 'CRT.sh (no exp.)',   `crt.sh/?q=${cx}${d}&exclude=expired`,   `https://crt.sh/?q=${cx}${urlSafe(d)}&exclude=expired`, 'dot-purple');
    add('discovery', 'CertSpotter API',    `sslmate.com/certspotter?domain=${d}`,   `https://sslmate.com/certspotter/api/v0/certs?domain=${d}`, 'dot-blue');
    add('discovery', 'RapidDNS',           `rapiddns.io/subdomain/${d}`,            `https://rapiddns.io/subdomain/${d}?full=1`, 'dot-blue');
    add('discovery', 'AlienVault OTX',     `otx.alienvault.com/${d}`,              `https://otx.alienvault.com/indicator/domain/${d}`, 'dot-blue');
    add('discovery', 'SecurityTrails',     `securitytrails.com/domain/${d}`,        `https://securitytrails.com/domain/${d}`, 'dot-blue');

    if (s.githubOrg) {
      const o = s.githubOrg;
      add('github', 'Domain mention',         `org:${o} "${d}"`,                                     `https://github.com/search?q=org%3A${o}+%22${d}%22&type=code`, 'dot-green');
      add('github', 'API Keys (generic)',     `org:${o} /(AIza|sk-|pk_|key-|secret-|api_)/`,         `https://github.com/search?q=org%3A${o}+%2F(AIza%7Csk-%7Cpk_%7Cxoxb-%7Ckey-%7Csecret-%7Ctoken-%7Capi_)%5B%5E%5Cs%5D%7B20%2C%7D%2F&type=code`, 'dot-green');
      add('github', 'Google API Keys',        `org:${o} /AIza[0-9A-Za-z_-]{35}/`,                   `https://github.com/search?q=org%3A${o}+%2FAIza%5B0-9A-Za-z_-%5D%7B35%7D%2F&type=code`, 'dot-green');
      add('github', 'AWS Keys (AKIA*)',       `org:${o} /AKIA[0-9A-Z]{16}/`,                        `https://github.com/search?q=org%3A${o}+%2FAKIA%5B0-9A-Z%5D%7B16%7D%2F&type=code`, 'dot-green');
      add('github', 'Private Keys (PEM)',     `org:${o} /BEGIN.*PRIVATE KEY/`,                      `https://github.com/search?q=org%3A${o}+%2F-----BEGIN+.*PRIVATE+KEY-----%2F&type=code`, 'dot-green');
      add('github', 'Password/Secret',        `org:${o} /(password|secret) = "/`,                   `https://github.com/search?q=org%3A${o}+%2F(password%7Csecret%7Cpasswd)%5Cs*%3D%5Cs*%5B%27%22%5D%5B%5E%27%22%5D%7B4%2C%7D%2F&type=code`, 'dot-green');
      add('github', 'JWT Tokens',             `org:${o} /eyJ...eyJ/`,                               `https://github.com/search?q=org%3A${o}+%2FeyJ%5B0-9A-Za-z_-%5D%7B20%2C%7D%5C.eyJ%2F&type=code`, 'dot-green');
      add('github', 'Connection Strings',     `org:${o} /jdbc:|mongodb:|redis:|postgres:|mysql:/`,  `https://github.com/search?q=org%3A${o}+%2F(jdbc%3A%7Cmongodb%3A%7Credis%3A%7Cpostgres%3A%7Cmysql%3A)%2F&type=code`, 'dot-green');
      add('github', '.env files',             `org:${o} path:**/.env /^[A-Z]{2,}_[A-Z_]{2,}=/`,     `https://github.com/search?q=org%3A${o}+%2F%5E%5BA-Z%5D%7B2%2C%7D_%5BA-Z_%5D%7B2%2C%7D%3D%2F+path%3A**%2F.env&type=code`, 'dot-green');
      add('github', 'Terraform tfvars',       `org:${o} path:**/terraform.tfvars`,                  `https://github.com/search?q=org%3A${o}+path%3A**%2Fterraform.tfvars+%2F%5E%5Ba-z_%5D%7B3%2C%7D%5Cs*%3D%2F&type=code`, 'dot-green');
      add('github', 'Docker config.json',     `org:${o} path:**/config.json /"auth"/`,              `https://github.com/search?q=org%3A${o}+path%3A**%2Fconfig.json+%2F%22auth%22%2F&type=code`, 'dot-green');
      add('github', 'CI/CD (gitlab-ci)',      `org:${o} path:**/.gitlab-ci.yml /SECRET/`,           `https://github.com/search?q=org%3A${o}+path%3A**%2F.gitlab-ci.yml+%2F%5BA-Z_%5D%7B3%2C%7D_SECRET%2F&type=code`, 'dot-green');
      add('github', 'GitHub Actions',         `org:${o} path:**/.github/workflows`,                 `https://github.com/search?q=org%3A${o}+path%3A**%2F.github%2Fworkflows+%2Fsecrets%7Ctoken%7Cpassword%2F&type=code`, 'dot-green');
      add('github', 'k8s secrets',            `org:${o} path:**/secret.yaml`,                       `https://github.com/search?q=org%3A${o}+path%3A**%2Fsecret.yaml+%2F%5Ba-zA-Z0-9%2B%2F%3D%5D%7B40%2C%7D%2F&type=code`, 'dot-green');
    }

    const dirs = [['Directory Listing','intitle:"index of /"'],['Admin Dir','intitle:"index of /admin"'],['Backup Dir','intitle:"index of /backup"'],['Log Files','ext:log'],['SQL Dumps','ext:sql'],['Env Files','ext:env'],['JSON Files','ext:json'],['XML Files','ext:xml'],['YAML Configs','ext:yml'],['Backup Files','ext:bak'],['Config Files','ext:conf'],['PEM Certs','ext:pem'],['Private Keys','ext:key'],['Text w/ Passwords','ext:txt intext:password']];
    for (const [t,dq] of dirs) add('dirs', t, `site:${d} ${dq}`, `https://www.google.com/search?q=${urlSafe(`site:${d} ${dq}`)}`, 'dot-orange');

    const dorks = [['Login Pages','inurl:login'],['Admin Panels','inurl:admin'],['Dashboards','inurl:dashboard'],['Signup Pages','inurl:signup'],['Registration','inurl:register'],['WordPress Admin','inurl:wp-admin'],['Login+Password','intitle:"login" intext:"password"'],['Dev Environments','inurl:dev'],['Staging','inurl:staging'],['UAT','inurl:uat'],['Beta','inurl:beta'],['Sandbox','inurl:sandbox'],['Demo','inurl:demo'],['Non-WWW','-inurl:www']];
    for (const [t,dq] of dorks) add('dorks', t, `site:${d} ${dq}`, `https://www.google.com/search?q=${urlSafe(`site:${d} ${dq}`)}`, 'dot-teal');

    const leaks = [['API Keys Exposed','intext:"api_key"'],['Secrets Exposed','intext:"secret"'],['Tokens Exposed','intext:"token"'],['Passwords','intext:"password"'],['RSA Private Keys','intext:"BEGIN RSA PRIVATE KEY"'],['AWS Access Keys','intext:"aws_access_key"'],['JDBC Strings','intext:"jdbc:"'],['MongoDB URIs','intext:"mongodb://"'],['SMTP Creds','intext:"smtp" intext:"password"'],['Sentry DSN','"sentry.io"'],['Stack Traces','intext:"stack trace"'],['Exceptions','intext:"exception"'],['Fatal Errors','intext:"fatal error"'],['Oracle Errors','"ORA-"'],['SQL Errors','"SQLSTATE"'],['Unexpected Errors','"unexpected error"']];
    for (const [t,dq] of leaks) add('info', t, `site:${d} ${dq}`, `https://www.google.com/search?q=${urlSafe(`site:${d} ${dq}`)}`, 'dot-red');

    add('shodan', `hostname:*.${d}`, `Shodan`, `https://www.shodan.io/search?query=hostname%3A*.${d}`, 'dot-pink');
    add('shodan', `hostname:${d}`, `Shodan exact`, `https://www.shodan.io/search?query=hostname%3A${d}`, 'dot-pink');
    add('shodan', `ssl:${d}`, `Shodan SSL`, `https://www.shodan.io/search?query=ssl%3A${d}`, 'dot-pink');
    add('shodan', `Censys Certs`, `censys.io`, `https://search.censys.io/certificates?q=${d}`, 'dot-pink');
    add('shodan', `Censys Hosts`, `censys.io`, `https://search.censys.io/hosts?q=${d}`, 'dot-pink');
    add('shodan', `URLScan.io`, `urlscan.io`, `https://urlscan.io/search/#*.${d}`, 'dot-pink');

    add('recon', 'Wayback CDX', `web.archive.org/cdx?url=*.${d}`, `https://web.archive.org/cdx/search/cdx?url=*.${d}/*&output=text&fl=original&collapse=urlkey`, 'dot-blue');
    add('recon', 'Wayback Calendar', `web.archive.org/web/*/${d}`, `https://web.archive.org/web/*/${d}/*`, 'dot-blue');
    add('recon', 'BuiltWith', `builtwith.com/${d}`, `https://builtwith.com/${d}`, 'dot-blue');
    add('recon', 'Wappalyzer', `wappalyzer.com/lookup/${d}`, `https://www.wappalyzer.com/lookup/${d}`, 'dot-blue');
    add('recon', 'GrayHatWarfare S3', `buckets.grayhatwarfare.com/${d}`, `https://buckets.grayhatwarfare.com/results/${d}`, 'dot-blue');
    add('recon', 'CommonCrawl', `commoncrawl.org *.${d}`, `https://index.commoncrawl.org/CC-MAIN-2024-51-index?url=*.${d}/*&output=json`, 'dot-blue');
  }
  const catDefs = [
    { id:'discovery', icon:'рЯФН', name:'Subdomain & Certificate Discovery' },
    { id:'github', icon:'рЯРЩ', name:'GitHub Code Search' },
    { id:'dirs', icon:'рЯУВ', name:'Directories & Sensitive Files' },
    { id:'dorks', icon:'рЯХµпЄП', name:'Dorks вАФ Login, Admin, Dev Panels' },
    { id:'info', icon:'рЯ©Ї', name:'Information Leaks & Errors' },
    { id:'shodan', icon:'рЯЫ∞пЄП', name:'Shodan & Censys' },
    { id:'recon', icon:'рЯМР', name:'External Recon Sources' },
  ];
  return catDefs.map(cat => ({ ...cat, links: all[cat.id] || [] })).filter(cat => cat.links.length > 0);
}

// ==================== RENDER ====================
function scrollToCat(id) {
  const el = document.getElementById('cat-'+id);
  if (el) { el.scrollIntoView({ behavior:'smooth', block:'start' }); toggleCat(id, true); }
}
window.toggleCat = function(id, force) {
  const body = document.getElementById('body-'+id), header = document.getElementById('head-'+id);
  if (!body) return;
  if (force !== undefined) { body.classList.toggle('open', force); header.classList.toggle('open', force); }
  else { body.classList.toggle('open'); header.classList.toggle('open'); }
};

function renderAll() {
  const main = document.querySelector('main');
  main.querySelectorAll('.cat-section').forEach(el => el.remove());

  // Tabs
  let tabsHtml = `<span class="tab all-tab ${activeIdx === -1 ? 'active' : ''}" onclick="setActive(-1)">рЯМР All (${scopes.length})</span>`;
  tabsHtml += scopes.map((s, i) =>
    `<span class="tab ${activeIdx === i ? 'active' : ''}" onclick="setActive(${i})">
      <span class="tab-type ${s.isWildcard ? 'tab-type-wc' : 'tab-type-ex'}">${s.isWildcard ? '*.WC' : 'EXACT'}</span>
      ${s.domain}
      ${s.githubOrg ? `<span class="tab-org">рЯРЩ${s.githubOrg}</span>` : ''}
      <span class="tab-rm" onclick="event.stopPropagation();removeScope(${i})">√Ч</span>
    </span>`
  ).join('');
  document.getElementById('tabRow').innerHTML = tabsHtml;

  // Active indicator
  const indicator = document.getElementById('activeIndicator');
  if (activeIdx === -1) {
    indicator.innerHTML = scopes.length ? `рЯУЛ Showing links for <span>all ${scopes.length} targets</span>` : '';
  } else if (scopes[activeIdx]) {
    const s = scopes[activeIdx];
    indicator.innerHTML = `рЯУЛ Showing links for <span>${s.isWildcard ? '*.' : ''}${s.domain}</span>${s.githubOrg ? ` (org: <span>${s.githubOrg}</span>)` : ''}`;
  }

  // Links for active scope(s)
  const scopeList = activeIdx === -1 ? scopes : (scopes[activeIdx] ? [scopes[activeIdx]] : []);
  const categories = genLinks(scopeList);
  updateBadges(categories);

  if (!scopes.length) {
    main.insertAdjacentHTML('beforeend', '<div class="empty-hint">рЯСЖ Add one or more domains above to generate recon links</div>');
    return;
  }

  for (const cat of categories) {
    const html = `
      <section class="cat-section" id="cat-${cat.id}">
        <div class="cat-header open" id="head-${cat.id}" onclick="toggleCat('${cat.id}')">
          <span class="icon">${cat.icon}</span><span class="name">${cat.name}</span>
          <span class="count">${cat.links.length} links</span><span class="arrow">вЦґ</span>
        </div>
        <div class="cat-body open" id="body-${cat.id}">
          <div class="link-grid">
            ${cat.links.map(l => `
              <a class="link-btn" href="${l.url}" target="_blank" rel="noopener">
                <span class="link-dot ${l.dot}"></span>
                <span class="link-body">
                  <div class="link-title">${l.title}</div>
                  <div class="link-sub">${l.sub}</div>
                </span>
              </a>
            `).join('')}
          </div>
        </div>
      </section>
    `;
    main.insertAdjacentHTML('beforeend', html);
  }
}

function updateBadges(cats) {
  for (const cat of cats) { const b = document.getElementById('badge-'+cat.id); if (b) b.textContent = cat.links.length; }
  ['discovery','github','dirs','dorks','info','shodan','recon'].forEach(id => {
    const b = document.getElementById('badge-'+id);
    if (b && !cats.find(c => c.id === id)) b.textContent = '0';
  });
}

// ==================== INIT ====================
scopes = load();
if (scopes.length > 0 && activeIdx === -1) activeIdx = scopes.length - 1;
document.getElementById('newDomain').addEventListener('keydown', e => { if (e.key==='Enter') addScope(); });
renderAll();
</script>
</body>
</html>
